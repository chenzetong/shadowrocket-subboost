name: Validate configuration

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python scripts/render_config.py --output /tmp/Shadowrocket.conf
      - run: python scripts/validate_config.py /tmp/Shadowrocket.conf
      - run: python scripts/validate_config.py Shadowrocket.conf
