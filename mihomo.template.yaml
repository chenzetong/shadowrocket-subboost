# Rules are evaluated from top to bottom. Keep specialized services before the
# broad China/non-China sets.
rules:
  # Local callbacks and reverse-DNS zones must not be captured by broader sets.
  - DOMAIN,localhost.weixin.qq.com,DIRECT
  - DOMAIN-SUFFIX,local,🏠 私有网络
  - DOMAIN-SUFFIX,in-addr.arpa,🏠 私有网络
  - DOMAIN-SUFFIX,ip6.arpa,🏠 私有网络
  - DOMAIN,shortconn.im.qcloud.com,🔒 国内服务
  - RULE-SET,block-httpdns,🧱 DNS 防泄露
  - RULE-SET,category-ads-all,🛑 广告拦截
  - RULE-SET,private,🏠 私有网络
  - RULE-SET,private-ip,🏠 私有网络,no-resolve
  - DOMAIN-SUFFIX,bybit.eu,🚀 节点选择
  - DOMAIN-SUFFIX,wsnailong.com,⚡ 自动选择
  - RULE-SET,huggingface,⚡ 自动选择
  - RULE-SET,google-gemini,✨ Gemini
  - RULE-SET,openai,🤖 AI 服务
  - RULE-SET,anthropic,🤖 AI 服务
  - RULE-SET,category-ai-chat-!cn,🤖 AI 服务
  - RULE-SET,lingjing-ai,🤖 AI 服务
  # Gemini and AI stay above the complete Google set to preserve their groups.
  - RULE-SET,google,🔍 谷歌服务
  - RULE-SET,youtube,📹 油管视频
  - RULE-SET,bilibili,🔒 国内服务
  - RULE-SET,telegram,📲 电报消息
  - RULE-SET,telegram-ip,📲 电报消息,no-resolve
  - RULE-SET,twitter,🐦 推特/X
  - RULE-SET,twitter-ip,🐦 推特/X,no-resolve
  - RULE-SET,github,🐱 代码托管
  - RULE-SET,gitlab,🐱 代码托管
  - RULE-SET,atlassian,🐱 代码托管
  - RULE-SET,microsoft,Ⓜ️ 微软服务
  # Apple Push is a subset of Apple and therefore must be evaluated first.
  - RULE-SET,apple-push,🍎 苹果推送
  - RULE-SET,apple,🍏 苹果服务
  - RULE-SET,apple-ip,🍏 苹果服务,no-resolve
  - RULE-SET,hk-broker,📈 券商服务
  - RULE-SET,paypal,💳 支付平台
  - RULE-SET,stripe,💳 支付平台
  - RULE-SET,wise,💳 支付平台
  - RULE-SET,binance,₿ 加密货币
  - RULE-SET,geolocation-cn,🔒 国内服务
  - RULE-SET,cn-ip,🔒 国内服务,no-resolve
  - RULE-SET,geolocation-!cn,🌍 非中国
  - RULE-SET,cn,🔒 国内服务
  - MATCH,🐟 漏网之鱼
