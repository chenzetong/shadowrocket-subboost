# shadowrocket-subboost - Mihomo configuration template
# Generate mihomo.yaml with: python3 scripts/render_config.py --subscription-url "https://..."

mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

