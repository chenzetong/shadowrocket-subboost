profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]

# Preserve the local WeChat callback used by the reference configuration.
hosts:
  localhost.weixin.qq.com: 127.0.0.1

# Keep the subscription URL outside version control. The render script replaces
# this placeholder and writes the ignored mihomo.yaml file.
proxy-providers:
  subscription:
    type: http
    url: "https://example.com/__SUBSCRIPTION_URL_PLACEHOLDER__"
    path: ./providers/subscription.yaml
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      lazy: false

proxies: []

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    use: [subscription]
    proxies: ["⚡ 自动选择", DIRECT, REJECT, "🇺🇸 美国中转", "🇬🇧 伦敦->荷兰"]

  - name: "⚡ 自动选择"
    type: url-test
    use: [subscription]
    filter: "(?i)^(dmit-pro-cuwhbza65y|dmit-malibu-0707|bwg-megabox-0910|ss-QQPW-US1|gee-ld-jvf53ssmv6|ss-helan)$"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: false

  - name: "🇺🇸 美国中转"
    type: select
    use: [subscription]
    filter: "(?i)^(bwg-megabox-0910|dmit-malibu-0707|dmit-pro-cuwhbza65y)$"

  - name: "🇬🇧 伦敦->荷兰"
    type: select
    use: [subscription]
    filter: "(?i)^gee-ld-jvf53ssmv6$"

  - name: "🛑 广告拦截"
    type: select
    proxies: [REJECT, DIRECT, "🚀 节点选择"]

  - name: "🧱 DNS 防泄露"
    type: select
    proxies: [REJECT, "🚀 节点选择", DIRECT]

  - name: "🤖 AI 服务"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "✨ Gemini"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "🔍 谷歌服务"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "📹 油管视频"
    type: select
    use: [subscription]
    proxies: ["⚡ 自动选择", "🚀 节点选择", DIRECT, REJECT]

  - name: "📲 电报消息"
    type: select
    use: [subscription]
    proxies: ["⚡ 自动选择", "🚀 节点选择", DIRECT, REJECT]

  - name: "🐦 推特/X"
    type: select
    use: [subscription]
    proxies: ["⚡ 自动选择", "🚀 节点选择", DIRECT, REJECT]

  - name: "🐱 代码托管"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "Ⓜ️ 微软服务"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "🍎 苹果推送"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "🍏 苹果服务"
    type: select
    use: [subscription]
    proxies: [DIRECT, "🚀 节点选择", "⚡ 自动选择", REJECT]

  - name: "📈 券商服务"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "🇺🇸 美国中转", "⚡ 自动选择", DIRECT, REJECT]

  - name: "🏠 私有网络"
    type: select
    use: [subscription]
    proxies: [DIRECT, REJECT, "🚀 节点选择", "⚡ 自动选择"]

  - name: "🔒 国内服务"
    type: select
    use: [subscription]
    proxies: [DIRECT, REJECT, "🚀 节点选择", "⚡ 自动选择"]

  - name: "🌍 非中国"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "🐟 漏网之鱼"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "💳 支付平台"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

  - name: "₿ 加密货币"
    type: select
    use: [subscription]
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT]

